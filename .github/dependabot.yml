version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/qllm/dashboard/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
