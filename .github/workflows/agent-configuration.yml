name: Agent configuration

on:
  pull_request:
    paths:
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
      - "PLANS.md"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
      - ".gitignore"
      - "docs/AGENT_OPERATING_MODEL.md"
      - "scripts/check_agent_setup.py"
      - "scripts/verify_changes.py"
      - "tests/test_agent_configuration.py"
      - "tests/test_verify_changes.py"
  push:
    branches:
      - main
    paths:
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
      - "PLANS.md"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
      - ".gitignore"
      - "docs/AGENT_OPERATING_MODEL.md"
      - "scripts/check_agent_setup.py"
      - "scripts/verify_changes.py"
      - "tests/test_agent_configuration.py"
      - "tests/test_verify_changes.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Validate agent operating files
        run: python scripts/check_agent_setup.py
      - name: Install focused test dependencies
        run: python -m pip install pytest==9.0.3 PyYAML==6.0.3
      - name: Run agent configuration tests
        run: python -m pytest -q tests/test_agent_configuration.py tests/test_verify_changes.py
