name: Python CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python 3.12 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-cpu.txt
      - name: Validate pinned profiles before installation
        run: python scripts/check_dependency_profiles.py
      - name: Install exact CPU profile
        run: python -m pip install -r requirements-cpu.txt
      - name: Install QLLM without re-resolving dependencies
        run: python -m pip install --no-deps -e .
      - name: Verify installed dependency consistency
        run: |
          python -m pip check
          python scripts/check_dependency_profiles.py --runtime-profile cpu
      - name: Compile Python sources
        run: python -m compileall -q qllm benchmarks scripts tests
      - name: Run complete CPU test suite
        run: python -m pytest -q --basetemp .tmp/pytest-ci
