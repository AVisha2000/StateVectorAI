name: Dashboard frontend

on:
  pull_request:
    paths:
      - "qllm/dashboard/frontend/**"
      - ".github/workflows/dashboard-frontend.yml"
  push:
    branches:
      - main
    paths:
      - "qllm/dashboard/frontend/**"
      - ".github/workflows/dashboard-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Node 22 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: qllm/dashboard/frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: qllm/dashboard/frontend/package-lock.json
      - name: Install locked frontend dependencies
        run: npm ci
      - name: Run all frontend behavior tests
        run: npm test
      - name: Build production frontend
        run: npm run build

  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: qllm/dashboard/frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: qllm/dashboard/frontend/package-lock.json
      - name: Install locked frontend dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # test:e2e builds the production bundle, serves it, and drives it in
      # headless Chromium against a fully mocked backend (no FastAPI/GPU needed).
      - name: Run Playwright E2E
        run: npm run test:e2e
