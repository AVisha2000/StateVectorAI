# Phase 2: identical architecture, FFN swapped for a 4-qubit data-reuploading VQC
model:
  d_model: 64
  n_heads: 4
  n_blocks: 2
  d_ff: 256          # unused by quantum FFN; kept for config parity
  max_seq_len: 128
  attn_type: classical
  ffn_type: quantum
  quantum:
    n_qubits: 4
    n_circuit_layers: 2
    ansatz: reuploading
    backend: pennylane
    device: default.qubit
    diff_method: backprop
train:
  seed: 0
  steps: 300
  batch_size: 16
  seq_len: 64
  lr: 0.001
  weight_decay: 0.01
  grad_clip: 1.0
  eval_every: 50
  eval_batches: 8
data:
  corpus_path: data/input.txt
  val_fraction: 0.1
tracking:
  enabled: true
  experiment: qllm
  run_name: quantum-ffn-4q
