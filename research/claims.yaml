  - claim_id: vqe_ground_state_optimization
    research_area_id: vqe_ground_state_optimization
    statement: Whether the registered analytic-simulator VQE runner can reproduce the ground-state energy of exactly diagonalizable toy Hamiltonians within a prespecified energy-error tolerance.
    level: untested
    status: untested
    replication_status: none
    task_type: ground_state
    metric_type: ground_state_energy_error
    evidence: []
    contradictions: []
    limitations:
      - Analytic statevector backpropagation is a simulator diagnostic, not finite-shot, QPU, or hardware-relevant evidence.
      - One exactly diagonalizable two-qubit instance cannot establish scaling or solver advantage.
      - Exact diagonalization is a certified reference rather than an equal-budget classical competitor.
      - solver_competition_v1 is declared, but solver-competition runners and comparative evidence are absent.
    fairness_schema:
      schema_id: solver_competition_v1
      comparator_kind: best_in_class_solver
      pairing_axis: problem_instance
      nested_seed_axis: model_seed
      required_equal:
        - problem.instance_id
        - problem.instance_hash
        - problem.energy_units
        - optimum.reference_id
        - optimum.role
        - optimum.value
        - optimum.units
        - budget.contract_hash
      required_present:
        - run_uuid
        - manifest_hash
        - solver.solver_id
        - solver.solver_version
        - solver.runner_id
        - solver.runner_version
        - solver.algorithm_family
        - solver.hyperparameters
        - solver.selected_trial_id
        - solver.configuration_hash
        - solver.code_hash
        - solver.environment_hash
        - solver.role
        - solver.model_seed
        - solver.computation_kind
        - solver.registration_status
      equal_budget_fields:
        - search.max_trials
        - search.max_objective_evaluations
        - search.max_wall_seconds
        - evaluation.model_seeds
        - evaluation.max_objective_evaluations_per_seed
        - evaluation.max_wall_seconds_per_seed
        - evaluation.shots_per_objective
        - evaluation.target_metric
        - evaluation.target_value
        - evaluation.termination_rule
      intentional_differences:
        - path: solver.solver_id
          reason: Best-in-class competition intentionally compares distinct registered solvers.
        - path: solver.solver_version
          reason: Each solver version is declared rather than forced to match.
        - path: solver.algorithm_family
          reason: Solver families may differ under the same prespecified competition budget.
        - path: solver.hyperparameters
          reason: Each arm may use its selected configuration within an equal search budget.
      resource_requirements:
        - objective_evaluations
        - wall_seconds
        - state_preparations
        - total_shots
        - peak_memory_bytes
        - state_representation
      allowed_optimum_roles: [best_known_optimum, certified_optimum]
    analogue_ladder:
      - rung_id: exact_diagonalization_reference
        required: true
        comparator: certified exact diagonalization of the identical registered Hamiltonian
        match_mode: logical_resources
        limitation: Exact diagonalization supplies ground truth and is not an equal-budget solver comparison.
      - rung_id: strong_classical_challenger
        required: true
        comparator: best-product-state or stronger declared classical variational solver on the identical instance
        match_mode: parameters
        limitation: Beating a product-state reference alone cannot establish a solver edge.
      - rung_id: resource_accounting
        required: true
        comparator: optimizer steps, logical objective calls, shots, wall time, and state representation
        match_mode: circuit_evaluations
        limitation: Analytic gradient calls must never be presented as measured QPU circuit executions.
    analysis_settings:
      phase: exploratory
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.001
      suites: []
      preset_ids: [vqe-tfim-2q]
    next_decisive_test: Implement solver-competition runners that record declared solver versions, equal budgets, problem-instance pairing, and certified or best-known optima; comparative evidence remains absent until those runs complete.
