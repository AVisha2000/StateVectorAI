      - source: RESULTS.md
        sections: [11, 12, 13]
        suites: [battery-v1, qrnn-landscape-v1]
        summary: Planted parameters reach a better basin than repeated random-initialization training runs.
    contradictions: []
    limitations:
      - Analytic simulator backpropagation does not establish hardware-feasible trainability.
    fairness_schema: *diagnostic_schema
    analogue_ladder: *diagnostic_ladder
    analysis_settings:
      phase: pilot
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.05
      suites: [battery-v1, qrnn-landscape-v1]
      preset_ids: [qrnn-small]
    next_decisive_test: Compare planted and warm starts with hardware-feasible optimizers using circuit evaluations and time-to-target as primary metrics.

  - claim_id: unitary_weight_transplant
    research_area_id: unitary_weight_transplant
    statement: Unitary weight transplantation provides a quantum-specific warm-start benefit beyond rank-, initialization-, and resource-matched classical compression controls.
    level: diagnostic
    status: relabeled
    replication_status: multi_seed_single_instance
    task_type: sequence_modeling
    metric_type: validation_perplexity
    evidence:
      - source: RESULTS.md
        sections: [11, 12]
        suites: [transplant-v1, transplant-v2]
        summary: The matched classical SVD warm-start twin reproduces the quantum transplant result.
    contradictions:
      - The matched low-rank classical twin overturns the earlier quantum-specific attribution.
    limitations:
      - The useful method is classically deployable and should be treated as quantum-inspired compression.
    fairness_schema: *component_schema
    analogue_ladder: *component_ladder
    analysis_settings:
      phase: confirmatory
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.1
      suites: [transplant-v1, transplant-v2]
      preset_ids: []
    next_decisive_test: Preserve the method as a compression baseline and implementation technique, not an advantage track.

  - claim_id: heuristic_parity_memory
    research_area_id: heuristic_parity_memory
    statement: The contextual quantum recurrent construction yields a theorem-aligned parity-memory separation over the declared classical model class.
    level: mechanism
    status: relabeled
    replication_status: single_task_instance
    task_type: sequence_modeling
    metric_type: constrained_accuracy
    evidence:
      - source: RESULTS.md
        sections: [14, 17, 18]
        suites: [contextual-v1]
        summary: Parity accumulation and routing work in bounded controls, while no end-to-end separation over the classical ladder is established.
    contradictions:
      - The generated task lacks the compatibility and contradiction structure required by the cited contextuality theorem.
    limitations:
      - No theorem-matched classical lower bound or independently replicated task family has been demonstrated.
    fairness_schema: &mechanism_schema
      schema_id: bounded_mechanism_probe_v1
      required_equal:
        - data.*
        - job.dataset_name
        - job.device_target
        - job.eval_every
        - job.seed
        - job.steps
        - seed_axes.generator
        - seed_axes.initialization
        - seed_axes.minibatch
        - train.eval_batches
      intentional_differences:
        - path: model.arch
          reason: Recurrent mechanism family is the prespecified intervention.
        - path: model.rnn_hidden
          reason: Classical recurrent width is the declared architecture-aware control axis and remains separately resource checked.
        - path: seed_axes.*circuit
          reason: Circuit randomness is explicitly not applicable to a circuit-free mechanism control.
      parameter_tolerance: 0.10
      resource_requirements: [n_params, wall_seconds]
    analogue_ladder: &mechanism_ladder
      - rung_id: linked_component_analogue
        required: true
        comparator: architecture-aware mechanism control
        match_mode: parameters
        limitation: The isolated mechanism needs a matched classical representation.
      - rung_id: parameter_match
        required: true
        comparator: parameter-matched mechanism control
        match_mode: parameters
        limitation: Unmatched capacity cannot support a mechanism attribution.
      - rung_id: resource_accounting
        required: true
        comparator: candidate and control resource ledgers
        match_mode: circuit_evaluations
        limitation: Simulator and circuit costs must remain visible.
      - rung_id: strong_classical_challenger
        required: true
        comparator: explicit classical algorithm or sufficiently wide architecture ladder
        match_mode: memory
        limitation: A small neural baseline does not establish a memory separation.
    analysis_settings:
      phase: pilot
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.02
      suites: [contextual-v1]
      preset_ids: []
    next_decisive_test: Relabel existing evidence as parity memory and separately reproduce a published contextual sequence task with proof-to-code invariants and theorem-matched controls.

  - claim_id: interference_output_head
