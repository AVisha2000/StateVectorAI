schema_version: 2

claims:
  - claim_id: variational_component_swaps
    research_area_id: variational_component_swaps
    statement: Generic variational quantum component swaps on classical text provide a quantum-specific predictive edge over matched trainable, frozen, and classical controls.
    level: diagnostic
    status: contradicted
    replication_status: multi_seed_single_instance
    task_type: sequence_modeling
    metric_type: validation_perplexity
    evidence:
      - source: RESULTS.md
        sections: [2, 6, 8, 10]
        suites: [ablation, qnlp-v1]
        summary: Trained circuits tie frozen circuits or lose to matched classical controls in the tested text regimes.
    contradictions:
      - Frozen/random circuits and matched classical bottlenecks explain the apparent parameter-efficiency observations.
    limitations:
      - Evidence covers small circuits, classical text, limited training budgets, and a single task instance.
    fairness_schema: &component_schema
      schema_id: controlled_component_ablation_v1
      required_equal:
        - data.*
        - job.dataset_name
        - job.device_target
        - job.eval_every
        - job.seed
        - job.steps
        - seed_axes.generator
        - seed_axes.initialization
        - seed_axes.minibatch
        - seed_axes.split
        - train.batch_size
        - train.eval_batches
        - train.grad_clip
        - train.lr
        - train.seq_len
        - train.weight_decay
      intentional_differences:
        - path: model.attn_type
          reason: Attention kind is an allowed named quantum-to-classical component intervention.
        - path: model.embed_type
          reason: Embedding kind is an allowed named quantum-to-classical component intervention.
        - path: model.encoder_kind
          reason: Sentence-encoder kind is an allowed named quantum-to-classical component intervention.
        - path: model.ffn_type
          reason: Feed-forward kind is an allowed named quantum-to-classical component intervention.
        - path: model.head_type
          reason: Output-head kind is an allowed named quantum-to-classical component intervention.
        - path: model.quantum.*
          reason: Top-level circuit settings are structurally inactive in the classical component analogue and remain explicitly reported.
        - path: model.blocks.*.attn_type
          reason: A declared per-block attention-kind swap is an allowed component intervention.
        - path: model.blocks.*.ffn_type
          reason: A declared per-block feed-forward-kind swap is an allowed component intervention.
        - path: model.blocks.*.quantum.*
          reason: Quantum-only per-block circuit settings are structurally absent from the classical component analogue.
        - path: seed_axes.*circuit
          reason: Circuit randomness applies to the quantum candidate and is structurally inapplicable to its classical analogue; every such mismatch remains explicit.
      parameter_tolerance: 0.10
      resource_requirements: [n_params, wall_seconds]
    analogue_ladder: &component_ladder
      - rung_id: linked_component_analogue
        required: true
        comparator: architecture-aware classical component analogue
        match_mode: parameters
        limitation: A missing or unfair linked analogue blocks an edge assessment.
      - rung_id: parameter_match
        required: true
        comparator: parameter-matched classical analogue
        match_mode: parameters
        limitation: Parameter imbalance must remain within the claim-specific tolerance.
      - rung_id: resource_accounting
        required: true
        comparator: candidate and analogue resource ledgers
        match_mode: circuit_evaluations
        limitation: Missing wall time or parameter/resource accounting blocks cost-aware interpretation.
      - rung_id: frozen_random_control
        required: true
        comparator: frozen or random quantum-feature control
        match_mode: circuit_evaluations
        limitation: Trainability cannot be attributed to the quantum component without this control.
      - rung_id: strong_classical_challenger
        required: true
        comparator: strongest architecture-aware classical challenger in the study
        match_mode: parameters
        limitation: A small curated twin does not exhaust the classical reference class.
    analysis_settings:
      phase: pilot
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.1
      suites: [ablation, qnlp-v1]
      preset_ids: [quantum-attn-4q, quantum-ffn-4q]
    next_decisive_test: Reopen only with a new data-mechanism alignment argument, powered paired instances, and frozen, no-entanglement, and architecture-aware classical controls.

  - claim_id: barren_plateau_scaling
    research_area_id: barren_plateau_scaling
    statement: The tested reuploading ansatz exhibits rapidly decaying gradient variance as qubit count grows under the repository scaling probe.
    level: diagnostic
    status: supported
    replication_status: within_study_resampling
    task_type: null
    metric_type: gradient_variance
    evidence:
      - source: RESULTS.md
        sections: [3]
        suites: [scaling_probe]
        summary: Repeated random initializations show exponential gradient-variance decay from two through twelve qubits.
    contradictions: []
    limitations:
      - This is a simulator diagnostic for one ansatz, depth, observable, and initialization family; it is not an advantage metric.
    fairness_schema: &diagnostic_schema
      schema_id: diagnostic_matched_probe_v1
      required_equal:
        - data.*
        - job.device_target
        - seed_axes.initialization
        - train.eval_batches
      intentional_differences:
        - path: model.quantum.n_qubits
          reason: Qubit count is the prespecified diagnostic sweep axis.
        - path: model.quantum.n_circuit_layers
          reason: Circuit depth may be a separately declared diagnostic sweep axis.
        - path: seed_axes.*circuit
          reason: Circuit randomness is explicitly not applicable to a circuit-free diagnostic comparator.
      parameter_tolerance: 1.0
      resource_requirements: [n_params, wall_seconds]
    analogue_ladder: &diagnostic_ladder
      - rung_id: linked_component_analogue
        required: false
        comparator: matched diagnostic reference
        match_mode: circuit_evaluations
        limitation: Diagnostic characterization does not by itself establish a model-quality edge.
      - rung_id: resource_accounting
        required: true
        comparator: per-size circuit and wall-time ledger
        match_mode: circuit_evaluations
        limitation: Scaling interpretation requires explicit work and precision accounting.
    analysis_settings:
      phase: exploratory
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.00001
      suites: [scaling_probe]
      preset_ids: []
    next_decisive_test: Expand to local initialization, layerwise training, finite-shot gradient signal-to-noise, optimizer success probability, and time-to-target.

  - claim_id: kernel_geometry_controls
    research_area_id: kernel_geometry_controls
    statement: Quantum-kernel geometry yields a held-out application benefit over a prespecified strong classical kernel family under nested model selection.
    level: diagnostic
    status: inconclusive
    replication_status: within_study_resampling
    task_type: null
    metric_type: kernel_target_alignment
    evidence:
      - source: RESULTS.md
        sections: [7]
        suites: [advantage_probe]
        summary: Engineered positive and classical negative controls behave as intended, while application selection remains test-leaky.
    contradictions:
      - Ridge regularization was selected on the test split and the classical challenger family was too narrow.
    limitations:
      - Engineered labels demonstrate instrument sensitivity rather than application advantage.
    fairness_schema: &kernel_schema
      schema_id: held_out_kernel_benchmark_v1
      required_equal:
        - data.*
        - job.dataset_name
        - seed_axes.generator
        - seed_axes.split
        - train.eval_batches
      intentional_differences:
        - path: model.kernel_family
          reason: Kernel family is the named comparison axis under an equal validation-search budget.
        - path: seed_axes.*circuit
          reason: Circuit randomness is explicitly not applicable to a circuit-free kernel comparator.
      parameter_tolerance: 0.10
      resource_requirements: [n_params, wall_seconds]
    analogue_ladder: &kernel_ladder
      - rung_id: linked_component_analogue
        required: true
        comparator: strong classical kernel family
        match_mode: parameters
        limitation: A narrow RBF-only comparison cannot support a kernel edge.
      - rung_id: resource_accounting
        required: true
        comparator: feature and kernel-evaluation budgets
        match_mode: state_preparations
        limitation: Kernel estimation, shots, and model-selection work must be reported.
      - rung_id: strong_classical_challenger
        required: true
        comparator: random-feature, projected, tensor-network, and neural kernel challengers
        match_mode: parameters
        limitation: The current classical attack family is incomplete.
    analysis_settings:
      phase: pilot
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.02
      suites: [advantage_probe]
      preset_ids: []
    next_decisive_test: Add nested validation, projected and classical challenger families, finite-shot ladders, and untouched held-out application labels.

  - claim_id: monitored_quantum_memory
    research_area_id: monitored_quantum_memory
    statement: A QRNN exploiting monitored quantum-process memory reaches a predictive target with less classical state or measured resource than the strong classical memory frontier.
    level: diagnostic
    status: blocked
    replication_status: single_task_instance
    task_type: sequence_modeling
    metric_type: predictive_memory_to_target
    evidence:
      - source: RESULTS.md
        sections: [9, 11, 12, 13]
        suites: [memory-sweep-v1, memory-sweep-v2, resonance-v1]
        summary: A fixed-capacity trend is visible, but well-provisioned classical models remain competitive in the measured range.
    contradictions:
      - The stated density-matrix dimension is an upper bound, not a proven minimal classical-memory lower bound.
    limitations:
      - Decisive runs lack independent generator-instance replication and complete oracle resource accounting.
    fairness_schema: &memory_schema
      schema_id: predictive_memory_scaling_v1
      required_equal:
        - data.*
        - job.device_target
        - job.eval_every
        - job.steps
        - seed_axes.generator
        - seed_axes.minibatch
        - seed_axes.split
        - train.eval_batches
      intentional_differences:
        - path: model.arch
          reason: Recurrent cell family is the prespecified quantum-memory versus classical-memory intervention.
        - path: model.rnn_hidden
          reason: Classical recurrent width is the declared capacity-ladder axis and remains separately resource checked.
        - path: seed_axes.*circuit
          reason: Circuit randomness is explicitly not applicable to a circuit-free memory comparator.
      parameter_tolerance: 0.25
      resource_requirements: [n_params, wall_seconds]
    analogue_ladder: &memory_ladder
      - rung_id: linked_component_analogue
        required: true
        comparator: matched classical predictive-memory model
        match_mode: memory
        limitation: A single small GRU is not a sufficient classical memory frontier.
      - rung_id: parameter_match
        required: false
        comparator: parameter-matched recurrent baseline
        match_mode: parameters
        limitation: Parameter matching is one view and does not replace a memory-capacity frontier.
      - rung_id: resource_accounting
        required: true
        comparator: candidate, oracle, and classical memory/resource ledgers
        match_mode: memory
        limitation: Oracle and simulator resources must be measured rather than recorded as zero.
      - rung_id: strong_classical_challenger
        required: true
        comparator: HMM, PSR, state-space, weighted-automaton, MPS, and scaled recurrent challengers
        match_mode: memory
        limitation: Task-specific compressed classical predictors remain untested.
    analysis_settings:
      phase: pilot
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.05
      suites: [memory-sweep-v1, memory-sweep-v2, resonance-v1]
      preset_ids: []
    next_decisive_test: Replicate generator instances, measure predictive-state rank, add task-specific classical challengers, and preregister the minimal memory needed to reach a fixed target.

  - claim_id: qrnn_representability_and_training
    research_area_id: qrnn_representability_and_training
