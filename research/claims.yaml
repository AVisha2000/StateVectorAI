    replication_status: multi_seed_single_instance
    task_type: sequence_modeling
    metric_type: excess_cross_entropy
    evidence:
      - source: RESULTS.md
        sections: [15]
        suites: [interference-head-v1]
        summary: The interference head reaches the exact entropy floor at matched single-layer parameter budgets.
    contradictions: []
    limitations:
      - The construction is classically simulable, the absolute gap is small, and the result is not an end-to-end sequence advantage.
    fairness_schema: *mechanism_schema
    analogue_ladder: *mechanism_ladder
    analysis_settings:
      phase: confirmatory
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.001
      suites: [interference-head-v1]
      preset_ids: []
    next_decisive_test: Keep this as a bounded expressivity probe and reopen end-to-end work only when the body exposes cancellation features without precomputing them.

  - claim_id: sequential_interference
