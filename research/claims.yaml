        suites: [interference-v1, interference-width, seq-interference-v1]
        summary: Interference ties or loses across all tested sequential regimes.
    contradictions:
      - End-to-end experiments contradict extension of the isolated head result into a sequence-level edge.
    limitations:
      - The result covers the tested feature-access regimes and does not exclude a future theory-driven construction.
    fairness_schema: *component_schema
    analogue_ladder: *component_ladder
    analysis_settings:
      phase: confirmatory
      alpha: 0.05
      target_power: 0.8
      bootstrap_resamples: 20000
      bootstrap_seed: 0
      sign_flip_draws: 20000
      sign_flip_seed: 0
      minimum_confirmatory_pairs: 6
      practical_equivalence_margin: 0.1
      suites: [interference-v1, interference-width, seq-interference-v1]
      preset_ids: []
    next_decisive_test: Archive the track unless a theory-driven task supplies the precise feature-access condition required by the isolated mechanism.

