        pipeline_stage: model
        quantum_resource: quantum_memory
        advantage_target: training_time
      - id: c_fault_tolerant
        area_id: fault_tolerant_ml_primitives
        kind: quantum_only
        pipeline_stage: training
        quantum_resource: amplitude_estimation
        advantage_target: query_complexity
      - id: c_communication_limited
        area_id: communication_limited_quantum_learning
        kind: quantum_only
        pipeline_stage: data_acquisition
        quantum_resource: entanglement
        advantage_target: communication_complexity
